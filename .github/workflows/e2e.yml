name: e2e

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run end-to-end suite
        env:
          # CI-provided token raises the GitHub API rate limit for section B.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: bash tests/e2e.sh
