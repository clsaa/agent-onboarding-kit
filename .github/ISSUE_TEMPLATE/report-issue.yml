name: Report an issue with an entry
description: Flag a broken link, stale data, or other problem with an existing manifest entry
title: "[issue]: "
labels:
  - report-issue
body:
  - type: input
    id: entry
    attributes:
      label: Which skill / entry
      description: The slug or name of the affected skills/<slug>.md file
      placeholder: skills/superpowers.md
    validations:
      required: true

  - type: dropdown
    id: problem-type
    attributes:
      label: Problem type
      options:
        - Broken link
        - Stale stars
        - Wrong compatibility
        - Bad install command
        - Other
    validations:
      required: true

  - type: textarea
    id: details
    attributes:
      label: Details
      description: What's wrong, and what you expected instead
    validations:
      required: true
